name: Integration Tests

on:
  workflow_dispatch:
  pull_request:
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["Check-Correctness"]
    types:
      - completed

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    environment: integration
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Start services
        run: docker compose -f testdata/composes/docker-compose.integraion.yaml up -d --wait

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/postgres?sslmode=disable
        run: go test -v -cover -tags=integration ./...

      - name: Stop services
        if: always()
        run: docker compose -f testdata/composes/docker-compose.integraion.yaml down
